<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will You Go Out With Me? 💖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="heart h1">💗</div>
  <div class="heart h2">💖</div>
  <div class="heart h3">💕</div>

  <div class="container">
    <div class="bunny">🐰💗</div>

    <h1>Will You Go Out With Me? 💖</h1>

    <div class="line">
      <span></span>
      <b>♥</b>
      <span></span>
    </div>

    <div class="buttons">
      <button id="yesBtn" class="btn yes">Yes! 💕</button>
      <button id="noBtn" class="btn no">No 🙈</button>
    </div>

    <p class="hint">✨ Hover over “No” button 😜</p>
    <p id="message" class="message"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
